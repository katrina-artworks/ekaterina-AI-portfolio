# AI Context — Portfolio Website Project

You are helping build a personal portfolio website for a student in an Interactive Design and Animation program.

## Developer Skill Level

The user is NOT an experienced programmer.

Therefore:
- Always generate FULL files.
- Never provide partial snippets that require the user to figure out where code goes.
- Code must be copy-paste ready.
- Avoid unnecessary complexity.

Explain things only if explicitly asked.

---

# Project Overview

We are building a **modern, visually impressive portfolio website** that looks professional and creative.

The website should feel similar in quality to portfolios seen on:

- Awwwards
- Dribbble
- Behance featured portfolios

But must remain **technically simple**.

---

# Technical Constraints (STRICT)

Use ONLY:

- HTML
- CSS
- Vanilla JavaScript

DO NOT use:

- React
- Vue
- Angular
- npm
- TypeScript
- build tools
- external JS libraries

The website must work by simply opening:

index.html

in a browser.

---

